model_list:
  - model_name: llama33
    litellm_params:
      model: openai/llama33
      api_base: http://blackwell:8001/v1
      api_key: sk-llm-stack

  - model_name: qwen36
    litellm_params:
      model: openai/qwen36
      api_base: http://blackwell:8002/v1
      api_key: sk-llm-stack

  - model_name: mimo25bw
    litellm_params:
      model: openai/mimo25bw
      api_base: http://blackwell:8006/v1
      api_key: sk-llm-stack

  - model_name: mimo
    litellm_params:
      model: openai/mimo
      api_base: http://a30:8003/v1
      api_key: sk-llm-stack

  - model_name: llava
    litellm_params:
      model: openai/llava
      api_base: http://a30:8004/v1
      api_key: sk-llm-stack

  - model_name: deepseek
    litellm_params:
      model: openai/deepseek
      api_base: http://a30:8005/v1
      api_key: sk-llm-stack
    priority: 5

router_settings:
  routing_strategy: simple-shuffle
  num_retries: 2
  timeout: 60
  retry_after: 1

general_settings:
  master_key: sk-llm-stack-master
  log_level: INFO
  database:
    type: sqlite
    uri: sqlite:///./litellm.db
