model_list:
  - model_name: llama33
    litellm_params:
      model: openai/llama-3.3-70b-instruct-awq
      api_base: http://blackwell:8001/v1
      api_key: sk-llm-stack

  - model_name: qwen36
    litellm_params:
      model: openai/qwen3.6-35b-claude-4.7-opus-reasoning-distilled
      api_base: http://blackwell:8002/v1
      api_key: sk-llm-stack

  - model_name: mimo
    litellm_params:
      model: openai/mimo-v2.5-pro
      api_base: http://a30:8003/v1
      api_key: sk-llm-stack

  - model_name: llava
    litellm_params:
      model: openai/llava
      api_base: http://a30:8004/v1
      api_key: sk-llm-stack

  - model_name: deepseek
    litellm_params:
      model: openai/deepseek-r1-distill-qwen-32b
      api_base: http://a30:8005/v1
      api_key: sk-llm-stack
    priority: 5

router_settings:
  routing_strategy: simple-shuffle
  num_retries: 2
  timeout: 60
  retry_after: 1

general_settings:
  master_key: sk-llm-stack-master
  log_level: INFO
  database:
    type: sqlite
    uri: sqlite:///./litellm.db
